<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <article class="temp">
        <button>Start</button>
    </article>

    <div class="wrapper none">
        <main class="timer"><span>01</span> : <span>00</span></main>
        <main>
        </main>
        <main>
            <form id="myform">
                <input type="button" class="btn pre previous" value="Previous">
                <input type="submit" class="submit" value="Submit">
                <input type="button" class="btn next" value="Next">
            </form>
        </main>

    </div>

    <footer class="foot hide">
        <h1>🚀Result🚀</h1>
       <div class="card">
            <p class="TotalQuations"></p>
            <p class="Attempt"></p>
            <p class="Right"></p>
            <p class="wrong"></p>
            <p class="score"></p>
            <p class="percentage"></p>
            <p class="Result"></p>
       </div>
    </footer>

    <script src="script.js"></script>

    

</body>

</html>
